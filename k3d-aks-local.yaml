#We’ll simulate:
#- 1 control-plane node
#- 2 worker nodes
#- A load balancer

apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: aks-local
servers: 1
agents: 2
image: rancher/k3s:v1.29.4-k3s1
ports:
  - port: 8080:80
    nodeFilters:
      - loadbalancer
options:
  k3s:
    extraArgs:
      - arg: "--disable=traefik"
        nodeFilters:
          - server:0
  kubeconfig:
    updateDefaultKubeconfig: true
    switchCurrentContext: true

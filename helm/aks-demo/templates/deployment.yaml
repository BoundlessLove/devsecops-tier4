apiVersion: apps/v1
kind: Deployment
metadata:
  name: aks-demo-deployment
  labels:
    app: aks-demo
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: aks-demo
  template:
    metadata:
      labels:
        app: aks-demo
    spec:
      containers:
        - name: aks-demo
          image: "{{ .Values.acrName }}.azurecr.io/{{ .Values.imageName }}:{{ .Values.imageTag }}"
          ports:
            - containerPort: 8080
